events {
    worker_connections 1024;
}

http {
    upstream go_api {
        server go-api:8080;
    }

    upstream ruby_api {
        server ruby-api:3001;
    }

    server {
        listen 80;
        server_name localhost;

        # Route to Go API for new endpoints
        location /api/v2 {
            proxy_pass http://go_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket support for Go API
        location /ws {
            proxy_pass http://go_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # File uploads and serving (Go API)
        location /uploads {
            proxy_pass http://go_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Integration endpoints (Go API)
        location /api/v1/integrations {
            proxy_pass http://go_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health checks - prefer Go API
        location /health {
            proxy_pass http://go_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Core API endpoints (Go API)
        location /api/v1 {
            proxy_pass http://go_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Fallback to Ruby API (if enabled)
        # location /legacy {
        #     proxy_pass http://ruby_api;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        # }

        # Static files for Go API
        location /static {
            proxy_pass http://go_api;
            proxy_set_header Host $host;
        }

        # Root redirect to API docs or health check
        location = / {
            return 302 /health;
        }
    }
}